<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #ffffff; font-family: 'Inter', 'Noto Sans JP', sans-serif; }

    /* Layout */
    .lp {
      display: flex;
      flex-direction: column;
      gap: 64px;
      align-items: center;
      padding: 48px 24px;
      background: #ffffff;
    }

    /* Nav */
    .nav {
      width: 100%;
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
    }
    .nav-logo {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-weight: 700;
      font-size: 20px;
      line-height: 1.2;
      color: #000;
    }

    /* Buttons */
    .btn-dark {
      background: #2c2c2c;
      border: 1px solid #2c2c2c;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-dark span {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 16px;
      color: #f5f5f5;
      white-space: nowrap;
      line-height: 1;
    }
    .btn-light {
      background: #e3e3e3;
      border: 1px solid #767676;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-light span {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 16px;
      color: #1e1e1e;
      white-space: nowrap;
      line-height: 1;
    }

    /* Hero */
    .hero {
      width: 100%;
    }
    .hero-inner {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 10px;
    }
    .hero-heading {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-weight: 700;
      font-size: 48px;
      line-height: 1.2;
      color: #000;
      letter-spacing: -0.96px;
      white-space: nowrap;
    }
    .hero-sub {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-weight: 400;
      font-size: 20px;
      line-height: 1.2;
      color: #000;
      white-space: nowrap;
    }
    .actions {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    /* Features */
    .features {
      background: #f5f5f5;
      border-radius: 16px;
      width: 100%;
    }
    .features-inner {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 32px;
    }
    .features-heading {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-weight: 600;
      font-size: 24px;
      line-height: 1.2;
      color: #000;
      letter-spacing: -0.48px;
      white-space: nowrap;
    }
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: flex-start;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      width: 280px;
      overflow: hidden;
    }
    .card-thumb {
      background: #d9d9d9;
      height: 160px;
      width: 100%;
    }
    .card-body {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 24px;
    }
    .card-title {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      font-size: 20px;
      line-height: 1.4;
      color: #1f2937;
    }
    .card-desc {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.7;
      color: #6b7280;
    }
    .card-price {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      font-size: 18px;
      line-height: 1.4;
      color: #e11d48;
    }
    .btn-buy {
      position: relative;
      height: 54px;
      width: 120px;
    }
    .btn-buy-inner {
      position: absolute;
      top: 0;
      left: 0;
      background: #2563eb;
      border-radius: 12px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .btn-buy-inner span {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: #ffffff;
      white-space: nowrap;
      line-height: 1;
    }

    /* CTA */
    .cta {
      background: #2c2c2c;
      border-radius: 16px;
      width: 100%;
    }
    .cta-inner {
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
      padding: 48px 24px;
    }
    .cta-heading {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-weight: 600;
      font-size: 24px;
      line-height: 1.2;
      color: #f5f5f5;
      letter-spacing: -0.48px;
      white-space: nowrap;
    }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .footer p {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: #000;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="lp">
    <!-- Nav -->
    <div class="nav">
      <div class="nav-inner">
        <p class="nav-logo">ロゴ</p>
        <button class="btn-dark"><span>Button</span></button>
      </div>
    </div>

    <!-- Hero -->
    <div class="hero">
      <div class="hero-inner">
        <p class="hero-heading">大見出し</p>
        <p class="hero-sub">一言</p>
        <div class="actions">
          <button class="btn-dark"><span>Button</span></button>
          <button class="btn-light"><span>Button</span></button>
        </div>
      </div>
    </div>

    <!-- Features -->
    <div class="features">
      <div class="features-inner">
        <p class="features-heading">見出し</p>
        <div class="cards">
          <div class="card">
            <div class="card-thumb"></div>
            <div class="card-body">
              <p class="card-title">ワイヤレスイヤホン</p>
              <p class="card-desc">軽量で長時間再生できるBluetoothイヤホン。</p>
              <p class="card-price">￥4,980</p>
              <div class="btn-buy">
                <button class="btn-buy-inner"><span>購入する</span></button>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-thumb"></div>
            <div class="card-body">
              <p class="card-title">ワイヤレスイヤホン</p>
              <p class="card-desc">軽量で長時間再生できるBluetoothイヤホン。</p>
              <p class="card-price">￥4,980</p>
              <div class="btn-buy">
                <button class="btn-buy-inner"><span>購入する</span></button>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-thumb"></div>
            <div class="card-body">
              <p class="card-title">ワイヤレスイヤホン</p>
              <p class="card-desc">軽量で長時間再生できるBluetoothイヤホン。</p>
              <p class="card-price">￥4,980</p>
              <div class="btn-buy">
                <button class="btn-buy-inner"><span>購入する</span></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta">
      <div class="cta-inner">
        <p class="cta-heading">見出し</p>
        <button class="btn-light"><span>Button</span></button>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>Figma's Simple Design System UI Kit is licensed by Figma under CC BY 4.0.</p>
    </div>
  </div>
</body>
</html>
