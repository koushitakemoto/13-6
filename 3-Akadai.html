<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
  table,
  td,
  th {
    border: 1px solid black;
  }
</style>
</head>
<body>
    <h1>旅のプラン紹介</h1>
    このページでは、人気の旅行プランとお申し込みフォームを紹介します。
    <h2>料金表</h2>
    <table>
        <thead>
            <tr>
                <th>プラン名</th>
                <th>日数</th>
                <th>料金</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>北海道満喫ツアー</td>
                <td>3日間</td>
                <td>55,000円</td>
            </tr>
            <tr>
                <td>沖縄リゾート</td>
                <td>4日間</td>
                <td>68,000円</td>
            </tr>
        </tbody>
       
    </table>
    <h2>プラン内容</h2>
    <dl>
        <dt>宿泊</dt>
        <dd>提携ホテルまたは温泉旅館</dd>
        <dt>食事</dt>
        <dd>朝食・夕食付き</dd>
    </dl>
    <h2>お問い合わせフォーム</h2>
    <form action="#" method="get">
  <p>
    <label>お名前：<input type="text" name="name" /></label>
  </p>
  <p>
    <label>メールアドレス：<input type="email" name="email" /></label>
  </p>
  <p>
    <label>希望プラン：<select name="Plan">
        <option value="1">北海道満喫ツアー</option>
        <option value="2">沖縄リゾート</option>
    </select></label>
  </p>
  <p>
    <label>出発希望日：<input type="date"></label>
  </p>
  <p>
    <label>ご要望：<textarea name="message"rows="4" cols="40"></textarea></label>
  </p>
  <label> <input type="checkbox" name="agree" /> 利用規約に同意します </label>
  </p>
  <p>
    <input type="submit" value="送信" />
  </p>
    </form>
</body>
</html>
