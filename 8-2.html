<!DOCTYPE html>
<html>
<head>
<title>Flexコンテナとアイテム</title>

<style>
.container {
  display: inline-flex; /* この要素がフレックスコンテナになる */
  border: 2px solid blue;
  padding: 10px;
  height: 150px;
}

.item {
  background-color: lightgreen;
  border: 1px solid green;
  padding: 15px;
  margin: 5px;
}
</style>

</head>
<body>

  <div class="container">
    <div class="item">アイテム 1</div>
    <div class="item">アイテム 2<br>（少し高さがある）</div>
    <div class="item">アイテム 3</div>
  </div>

</body>
</html>
